services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tropelcare
      POSTGRES_USER: tropelcare
      POSTGRES_PASSWORD: tropelcare
    ports:
      # Host 5433 -> container 5432 (en macOS suele haber un Postgres nativo en 5432).
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tropelcare -d tropelcare"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - tropelcare_pgdata:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: "8080"
      HOST: "0.0.0.0"
      DATABASE_URL: "postgresql://tropelcare:tropelcare@postgres:5432/tropelcare"
      DB_POOL_MAX: "10"
      JWT_SECRET: "local-dev-jwt-secret-please-change-in-prod-please"
      ADMIN_TOKEN: "local-dev-admin-token-please-change-in-prod-please"
      CORS_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
      CORS_ORIGIN_PATTERNS: "https://*.vercel.app,https://*.netlify.app"
      RATE_LIMIT_PER_WORKSPACE: "600"
      SEED_ON_BOOT: "true"
      SEED_PASSWORD_PREFIX: "Pizza"
      SEED_WORKSPACE_COUNT: "100"
      SEED_TROPELS_PER_WORKSPACE: "120"
      SEED_SIGNALS_PER_WORKSPACE: "600"

volumes:
  tropelcare_pgdata:
